# ===== Earned Schedule (EVM) =====
- key: lipke_2003
  title: "Schedule is Different"
  authors: ["Lipke, Walt"]
  year: 2003
  venue: "The Measurable News, Summer 2003, 31-34"
  type: paper
  status: unverified
  aliases: ["Lipke 2003", "Lipke, 2003", "Lipke (2003)"]
  summary: >
    Introduces Earned Schedule (ES): a time-based EVM measure that
    avoids the SPI = 1 paradox at project end.  ES samples the cumulative
    PV at every activity Start/Finish boundary; SPI(t) = ES / AT.
    Implemented in evm/metrics.py::compute_earned_schedule and
    surfaced in the /evm/analyze response.
  methods: [earned_schedule, SPI_t, TEAC_t]
  cites: []

