  type: paper
  doi: "10.1214/aos/1176343003"
  status: unverified
  aliases: ["Pickands 1975", "Pickands, 1975", "Pickands (1975)"]
  summary: >
    Foundational result: exceedances over a high threshold converge
    asymptotically to the Generalized Pareto Distribution (GPD).
    Cited in the roadmap as basis for R1 -- a possible upgrade of
    the tier-5 Pareto-power-law to GPD.
  methods: [GPD, extreme_value_theory, threshold_exceedance]
  cites: []

