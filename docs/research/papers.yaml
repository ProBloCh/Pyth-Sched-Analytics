# Research-provenance knowledge graph for Pyth-Sched-Analytics.
#
# Source of truth for every paper / report / standard cited in the
# codebase or the planning docs.  Entries are validated by
# tools/research_graph and reconciled against the codebase via the
# `python -m tools.research_graph sync` command (run automatically in
# CI -- see .github/workflows/research-graph.yml).
#
# Schema documented in docs/research/README.md.  All `status:
# unverified` entries should be re-checked against Crossref / arXiv
# via `python -m tools.research_graph verify` before being relied on.
# Citations were transcribed from earlier doc commits and the
# planning roadmap; until verified, treat them as starting points
# for a literature check, not authoritative.
---
schema_version: 1
papers:

# ===== Critical Path Method foundational =====
- key: elmaghraby_1977
  title: "Activity Networks: Project Planning and Control by Network Models"
  authors: ["Elmaghraby, Salah E."]
  year: 1977
  venue: "Wiley-Interscience"
  type: textbook
  status: unverified
  aliases: ["Elmaghraby 1977", "Elmaghraby, 1977"]
  summary: >
    Standard reference for precedence diagram method (PDM) including
    finish-to-start, start-to-start, finish-to-finish and start-to-finish
    relationships with lag.  The CPM forward/backward pass in solver/dag.py
    follows this formulation.
  methods: [CPM, PDM, FS_SS_FF_SF_lag]
  cites: []

- key: van_slyke_1963
  title: "Monte Carlo Methods and the PERT Problem"
  authors: ["Van Slyke, Richard M."]
  year: 1963
  venue: "Operations Research, 11(5), 839-860"
  type: paper
  doi: "10.1287/opre.11.5.839"
  status: unverified
  aliases: ["Van Slyke 1963", "Van Slyke, 1963"]
  summary: >
    Establishes the Criticality Index (CI): the fraction of MC samples
    in which a given activity is on the critical path.  Implemented in
    solver/analysis.py.
  methods: [criticality_index, monte_carlo_pert]
  cites: []

- key: williams_1992
  title: "Criticality in Stochastic Networks"
  authors: ["Williams, Terry"]
  year: 1992
  venue: "Journal of the Operational Research Society, 43(4), 353-357"
  type: paper
  doi: "10.1057/jors.1992.50"
  status: unverified
  aliases: ["Williams 1992", "Williams, 1992"]
  summary: >
    Introduces the Cruciality Index: Spearman correlation between an
    activity's duration and the project makespan across an MC ensemble.
    Captures schedule sensitivity that the Criticality Index misses for
    near-critical activities.
  methods: [cruciality_index, schedule_sensitivity]
  cites: [van_slyke_1963]

