# ===== Tail-risk and extreme-value theory =====
- key: sornette_2009
  title: "Dragon-Kings, Black Swans and the Prediction of Crises"
  authors: ["Sornette, Didier"]
  year: 2009
  venue: "International Journal of Terraspace Science and Engineering, 2(1)"
