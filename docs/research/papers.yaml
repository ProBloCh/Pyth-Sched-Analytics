  aliases: ["Coles 2001"]
  summary: >
    Standard reference for extreme-value methodology, including
    threshold-selection diagnostics (mean residual life, Hill plot)
    needed to operationalise GPD per Pickands 1975.
  methods: [extreme_value_theory, GPD, threshold_selection]
  cites: [pickands_1975]

