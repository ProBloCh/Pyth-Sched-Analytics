# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - Python-Sched-Analytics

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ruff
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check .

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run tests
        run: |
          source venv/bin/activate
          python -m pytest tests/ -v

      - name: Zip artifact for deployment
        if: github.event_name == 'push'
        run: zip release.zip ./* -r -x 'venv/*' 'tests/*' '.github/*' 'docs/*' '*.md'

      - name: Upload artifact for deployment jobs
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      
      - name: Azure Login
        uses: azure/login@v2 # Updated to v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B6A38D2446ED4D1CB4E4E128B393666F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_65436CB7846C41FF8EB9050FBFB74AF6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6EE819F7C4B9480AAA19454152E04199 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3 # Updated to v3
        id: deploy-to-webapp
        with:
          app-name: 'Python-Sched-Analytics'
          slot-name: 'production'
          