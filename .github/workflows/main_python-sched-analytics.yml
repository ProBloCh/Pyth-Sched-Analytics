# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - Python-Sched-Analytics

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dev tools
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    # Non-blocking advisory gate.  See docs/typing-progress.md for the
    # error-budget protocol.  We want the typecheck output visible in
    # CI logs without showing a red ✗ on the PR while the basic-mode
    # baseline shrinks.  The step exits 0 deliberately and surfaces
    # the error count via a GitHub workflow annotation; CI flips to
    # blocking (drop the `|| true`) once basic-mode reaches zero.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dev tools
        run: pip install -r requirements-dev.txt

      - name: pyright
        run: |
          set +e
          pyright | tee pyright.out
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            COUNT=$(grep -oE '^[0-9]+ error' pyright.out | head -1 | awk '{print $1}')
            echo "::warning title=pyright (advisory)::${COUNT:-unknown} basic-mode error(s); see docs/typing-progress.md"
          fi
          exit 0

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dev tools
        run: pip install -r requirements-dev.txt

      # Static security scan.  Existing intentional patterns annotated
      # inline with `# nosec <code>`.  -ll = medium severity floor.
      - name: bandit
        run: bandit -r . -c pyproject.toml -ll

      # Dependency CVE scan.  --ignore-vuln entries below allowlist
      # known advisories that require a coordinated runtime-package
      # upgrade (tracked in docs/roadmap-to-10.md PR-6 follow-up).  Any
      # NEW advisory failing the scan blocks merge.
      - name: pip-audit
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2026-27205 \
            --ignore-vuln PYSEC-2024-110 \
            --ignore-vuln CVE-2024-1135 \
            --ignore-vuln CVE-2024-6827

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        # --cov-fail-under is read from pyproject.toml [tool.coverage.report].
        # See docs/roadmap-to-10.md PR-7 for the threshold-bump protocol.
        run: |
          source venv/bin/activate
          python -m pytest tests/ -v --cov --cov-report=term --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Zip artifact for deployment
        if: github.event_name == 'push'
        run: zip release.zip ./* -r -x 'venv/*' 'tests/*' '.github/*' 'docs/*' '*.md'

      - name: Upload artifact for deployment jobs
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      
      - name: Azure Login
        uses: azure/login@v2 # Updated to v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B6A38D2446ED4D1CB4E4E128B393666F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_65436CB7846C41FF8EB9050FBFB74AF6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6EE819F7C4B9480AAA19454152E04199 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3 # Updated to v3
        id: deploy-to-webapp
        with:
          app-name: 'Python-Sched-Analytics'
          slot-name: 'production'
          